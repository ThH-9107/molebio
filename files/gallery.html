<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Mole-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { midnight: '#020617', neon: '#4ade80', cyan: '#22d3ee' },
                fontFamily: { mono: ['Space Mono','monospace'], body: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
            }}
        }
    </script>
    <style>
        :root { --neon: #4ade80; --cyan: #22d3ee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #020617;
            font-family: 'DM Sans', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Animated gradient background */
        .animated-bg {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(-45deg, #020617, #0a1628, #020617, #071520);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
        }
        @keyframes bgShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Dynamic blur background (changes with current image) */
        #dynamic-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.15) saturate(1.5);
            transition: background-image 0.8s ease;
            transform: scale(1.15);
        }

        /* Neon utilities */
        .grad-text { background: linear-gradient(135deg,#fff 0%,var(--neon) 50%,var(--cyan) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(74,222,128,0.12); }
        .neon-border { border:1px solid var(--neon); box-shadow:0 0 20px rgba(74,222,128,0.3); }
        .section-label { font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.25em; color:var(--neon); text-transform:uppercase; }
        .bio-tag { font-family:'Space Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; padding:6px 16px; border:1px solid var(--neon); color:var(--neon); border-radius:2px; text-transform:uppercase; transition:all 0.3s; display:inline-flex; align-items:center; }
        .bio-tag::before { content:'[ '; color:rgba(74,222,128,0.5); }
        .bio-tag::after { content:' ]'; color:rgba(74,222,128,0.5); }
        .bio-tag:hover { background:rgba(74,222,128,0.1); color:#fff; }

        /* Navbar */
        #navbar { transition: all 0.4s ease; }
        #navbar.scrolled { background:rgba(2,6,23,0.9)!important; backdrop-filter:blur(24px); border-bottom:1px solid rgba(74,222,128,0.15); }

        /* Category buttons */
        .cat-btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem; letter-spacing: 0.12em;
            padding: 8px 22px; border-radius: 2px;
            border: 1px solid rgba(74,222,128,0.2);
            color: rgba(74,222,128,0.5);
            transition: all 0.3s; text-transform: uppercase;
            background: transparent; cursor: pointer;
        }
        .cat-btn:hover { border-color:var(--neon); color:var(--neon); background:rgba(74,222,128,0.05); }
        .cat-btn.active {
            background: rgba(74,222,128,0.12);
            border-color: var(--neon); color: var(--neon);
            box-shadow: 0 0 15px rgba(74,222,128,0.25);
        }

        /* Main image area */
        .image-stage {
            position: relative;
            border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(74,222,128,0.15);
            background: rgba(10,22,40,0.5);
            cursor: zoom-in;
        }
        .image-stage img {
            width: 100%; height: 100%;
            object-fit: contain;
            transition: opacity 0.35s ease;
            display: block;
        }
        .image-stage:hover img { filter: brightness(1.05); }
        .zoom-hint {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em;
            background: rgba(2,6,23,0.8); color: rgba(74,222,128,0.7);
            padding: 5px 14px; border-radius: 20px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        .image-stage:hover .zoom-hint { opacity: 1; }

        /* Nav buttons */
        .nav-btn {
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(74,222,128,0.08);
            border: 1px solid rgba(74,222,128,0.2);
            color: rgba(74,222,128,0.7);
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .nav-btn:hover { background:rgba(74,222,128,0.2); border-color:var(--neon); color:#fff; box-shadow:0 0 15px rgba(74,222,128,0.3); }

        /* Thumbnail bar */
        .thumb-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .thumb-item {
            width: 70px; height: 50px;
            border-radius: 8px; overflow: hidden;
            cursor: pointer; opacity: 0.4;
            border: 1px solid transparent;
            transition: all 0.3s; flex-shrink: 0;
        }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-item:hover, .thumb-item.active {
            opacity: 1;
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(74,222,128,0.4);
            transform: translateY(-3px);
        }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(2,6,23,0.95); backdrop-filter: blur(12px);
            align-items: center; justify-content: center; cursor: zoom-out;
        }
        #lightbox.open { display: flex; }
        #lightbox img {
            max-width: 90vw; max-height: 88vh;
            border-radius: 12px; border: 1px solid rgba(74,222,128,0.2);
            box-shadow: 0 0 60px rgba(74,222,128,0.2);
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
        #lightbox-close {
            position: absolute; top: 24px; right: 32px;
            font-size: 2rem; color: rgba(255,255,255,0.5);
            cursor: pointer; transition: color 0.2s;
            font-family: 'Space Mono', monospace;
        }
        #lightbox-close:hover { color: var(--neon); }

        /* Counter badge */
        .counter-badge {
            font-family: 'Space Mono', monospace; font-size: 0.75rem;
            color: rgba(74,222,128,0.6);
            background: rgba(74,222,128,0.08);
            border: 1px solid rgba(74,222,128,0.15);
            padding: 4px 12px; border-radius: 20px;
        }

        /* Date tag */
        .date-tag {
            font-family: 'Space Mono', monospace; font-size: 0.75rem;
            color: #a7ffeb;
            background: rgba(167,255,235,0.08);
            border: 1px solid rgba(167,255,235,0.2);
            padding: 4px 14px; border-radius: 20px;
        }

        /* Keyboard hint */
        .key-hint {
            font-family: 'Space Mono', monospace; font-size: 0.65rem;
            color: rgba(255,255,255,0.25); letter-spacing: 0.05em;
        }
        .key-hint kbd {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px; padding: 1px 6px;
        }
    </style>
</head>
<body>

<!-- Backgrounds -->
<div class="animated-bg"></div>
<div id="dynamic-bg"></div>

<!-- Lightbox -->
<div id="lightbox">
    <span id="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="Zoomed">
</div>

<!-- NAVBAR -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 px-6 md:px-16 py-4 flex items-center justify-between">
    <a href="../index.html" class="flex items-center gap-3 group">
        <div class="w-9 h-9 rounded-lg neon-border flex items-center justify-center">
            <img src="../assets/img/619092936_25447345694967110_1532795051963747594_n-removebg-preview.png" class="w-7 h-7 object-contain" alt="" onerror="this.style.display='none'">
        </div>
        <span class="font-display font-bold text-lg text-white group-hover:text-neon transition-colors">Mole<span class="text-neon">-Bio</span></span>
    </a>
    <a href="../index.html" class="bio-tag hover:no-underline text-xs">← Back to Home</a>
</nav>

<!-- MAIN LAYOUT -->
<main class="min-h-screen pt-28 pb-16 px-4 md:px-10 lg:px-16">
    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="text-center mb-10">
            <p class="section-label mb-3">// Art & Photo Gallery</p>
            <h1 class="font-display text-4xl md:text-5xl font-extrabold text-white">
                Thư viện <span class="grad-text">Ảnh</span>
            </h1>
        </div>

        <!-- Category buttons -->
        <div class="flex justify-center gap-3 mb-8 flex-wrap">
            <button class="cat-btn active" onclick="switchCategory('tiensi', event)">🔬 Nhánh Tiến sĩ</button>
            <button class="cat-btn" onclick="switchCategory('chuonchuon', event)">🦗 Nhánh Chuồn chuồn</button>
        </div>

        <!-- Glass container -->
        <div class="glass rounded-3xl p-6 md:p-10">

            <!-- Image counter + keyboard hint -->
            <div class="flex items-center justify-between mb-6">
                <span class="counter-badge" id="img-counter">1 / 1</span>
                <span class="key-hint hidden md:block">
                    Navigate: <kbd>←</kbd> <kbd>→</kbd> &nbsp; Close lightbox: <kbd>Esc</kbd>
                </span>
                <span class="date-tag" id="img-date">—</span>
            </div>

            <!-- Main display row -->
            <div class="flex items-center gap-4 mb-6">
                <button class="nav-btn" onclick="changeImage(-1)" aria-label="Previous">
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>

                <div class="image-stage flex-1 h-[400px] md:h-[480px]" onclick="openLightbox()">
                    <img id="current-img" src="" alt="Gallery Image">
                    <div class="zoom-hint"><i class="fas fa-search-plus mr-1"></i> CLICK TO ZOOM</div>
                </div>

                <button class="nav-btn" onclick="changeImage(1)" aria-label="Next">
                    <i class="fas fa-chevron-right text-sm"></i>
                </button>
            </div>

            <!-- Thumbnails -->
            <div class="thumb-bar mb-8" id="thumb-bar"></div>

            <!-- Image info -->
            <div class="text-center border-t border-neon/10 pt-6">
                <h2 id="img-title" class="font-display text-2xl font-bold text-white mb-2">—</h2>
                <p id="img-desc" class="text-slate-500 text-sm max-w-lg mx-auto leading-relaxed">—</p>
            </div>

        </div>
    </div>
</main>

<!-- FOOTER -->
<footer class="border-t border-neon/10 py-8 px-6 md:px-16">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <span class="font-display font-bold text-white">Mole<span class="text-neon">-Bio</span></span>
        <p class="font-mono text-xs text-slate-700">&copy; 2026 Mole-Bio.</p>
    </div>
</footer>

<script>
/* ── Gallery Data ── */
const galleryData = {
    tiensi: [
        { src: "../Gallery Image/Tiến sĩ/Giảng gì đó.jpg",           title: "Buổi giảng",         date: "10/03/2026", desc: "Chuyên gia chia sẻ kiến thức trong buổi học." },
        { src: "../Gallery Image/Tiến sĩ/Nghe chăm chú.jpg",         title: "Lắng nghe",           date: "10/03/2026", desc: "Những đôi tai chú ý nhất phòng Lab." },
        { src: "../Gallery Image/Tiến sĩ/check var gián.jpg",         title: "Kiểm tra mẫu",        date: "10/03/2026", desc: "Quy trình kiểm tra cẩn thận từng biến số." },
        { src: "../Gallery Image/Tiến sĩ/chăm chú.jpg",              title: "Tập trung cao độ",    date: "10/03/2026", desc: "Khoảnh khắc tập trung tuyệt đối." },
        { src: "../Gallery Image/Tiến sĩ/chụp lớp.jpg",              title: "Ảnh tập thể",         date: "10/03/2026", desc: "Cả nhóm nghiên cứu cùng nhau." },
        { src: "../Gallery Image/Tiến sĩ/hết giờ r.jpg",             title: "Hết giờ rồi!",        date: "10/03/2026", desc: "Kết thúc một buổi thực hành dài." },
        { src: "../Gallery Image/Tiến sĩ/intro.jpg",                 title: "Giới thiệu",          date: "10/03/2026", desc: "Mở đầu chương trình." },
        { src: "../Gallery Image/Tiến sĩ/m hỉu t nói ko.jpg",       title: "Hả?",                 date: "10/03/2026", desc: "Khoảnh khắc chưa kịp hiểu." },
        { src: "../Gallery Image/Tiến sĩ/nhìn huh.jpg",              title: "Nhìn huh",            date: "10/03/2026", desc: "Ánh mắt suy nghĩ sâu xa." },
        { src: "../Gallery Image/Tiến sĩ/phải đi hỏi lại.jpg",      title: "Đi hỏi lại thôi",    date: "10/03/2026", desc: "Khi cần làm rõ thêm vấn đề." },
        { src: "../Gallery Image/Tiến sĩ/spotlight.jpg",             title: "Spotlight",           date: "10/03/2026", desc: "Dưới ánh đèn phòng thí nghiệm." },
        { src: "../Gallery Image/Tiến sĩ/thực hành nhưng góc khác.jpg", title: "Thực hành — góc khác", date: "10/03/2026", desc: "Một góc nhìn mới về thực hành." },
        { src: "../Gallery Image/Tiến sĩ/thực hành nè.jpg",         title: "Thực hành",           date: "10/03/2026", desc: "Trực tiếp thao tác thí nghiệm." },
        { src: "../Gallery Image/Tiến sĩ/trao đổi 1.jpg",           title: "Trao đổi #1",         date: "10/03/2026", desc: "Thảo luận khoa học sôi nổi." },
        { src: "../Gallery Image/Tiến sĩ/trao đổi 2.jpg",           title: "Trao đổi #2",         date: "10/03/2026", desc: "Ý kiến từ nhiều chiều." },
        { src: "../Gallery Image/Tiến sĩ/trao đổi 3.jpg",           title: "Trao đổi #3",         date: "10/03/2026", desc: "Cuộc tranh luận tiếp tục." },
        { src: "../Gallery Image/Tiến sĩ/đập bàn.jpg",              title: "Eureka!",             date: "10/03/2026", desc: "Khoảnh khắc phát hiện ra điều gì đó thú vị." }
    ],
    chuonchuon: [
        { src: "../Gallery Image/Chuồn Chuồng/a bunch of pp.jpg",   title: "Team đầy đủ",        date: "15/03/2026", desc: "Tất cả thành viên nhánh Chuồn chuồn." },
        { src: "../Gallery Image/Chuồn Chuồng/chị di.jpg",          title: "Chị Di",             date: "15/03/2026", desc: "Hướng dẫn tận tình từ chị Di." },
        { src: "../Gallery Image/Chuồn Chuồng/cô thảo nè.jpg",     title: "Cô Thảo",            date: "15/03/2026", desc: "Giáo viên hướng dẫn buổi thực hành." },
        { src: "../Gallery Image/Chuồn Chuồng/tim.jpg",             title: "Tim — chuồn chuồn",  date: "15/03/2026", desc: "Quan sát tim của chuồn chuồn." },
        { src: "../Gallery Image/Chuồn Chuồng/dụng cụ.jpg",        title: "Dụng cụ thí nghiệm", date: "15/03/2026", desc: "Trang bị đầy đủ cho buổi thực hành." },
        { src: "../Gallery Image/Chuồn Chuồng/tim in progress.jpg", title: "Tim đang quan sát",  date: "15/03/2026", desc: "Quá trình quan sát tim đang diễn ra." },
        { src: "../Gallery Image/Chuồn Chuồng/tiêm.jpg",           title: "Thao tác tiêm",      date: "15/03/2026", desc: "Kỹ thuật tiêm cần sự chính xác cao." },
        { src: "../Gallery Image/Chuồn Chuồng/tsao lại là cô.jpg", title: "Lại là cô rồi!",    date: "15/03/2026", desc: "Khoảnh khắc hài hước trong Lab." },
        { src: "../Gallery Image/Chuồn Chuồng/vẫn tim.jpg",        title: "Vẫn còn tim",        date: "15/03/2026", desc: "Tiếp tục quan sát mẫu vật." },
        { src: "../Gallery Image/Chuồn Chuồng/xem gì đó 1.jpg",   title: "Xem gì đó #1",      date: "15/03/2026", desc: "Tập trung vào tiêu bản." },
        { src: "../Gallery Image/Chuồn Chuồng/xem gì đó 2.jpg",   title: "Xem gì đó #2",      date: "15/03/2026", desc: "Nhìn vào kính hiển vi." },
        { src: "../Gallery Image/Chuồn Chuồng/xem gì đó 3.jpg",   title: "Xem gì đó #3",      date: "15/03/2026", desc: "Góc nhìn của nhà khoa học." },
        { src: "../Gallery Image/Chuồn Chuồng/âu iếm.jpg",        title: "Âu yếm",            date: "15/03/2026", desc: "Khoảnh khắc thư giãn sau thí nghiệm." }
    ]
};

let currentCategory = 'tiensi';
let currentIndex = 0;
let images = galleryData[currentCategory];

function updateGallery() {
    const data = images[currentIndex];
    if (!data) return;

    const imgEl = document.getElementById('current-img');
    const bgEl  = document.getElementById('dynamic-bg');

    imgEl.style.opacity = '0';
    setTimeout(() => {
        imgEl.src = data.src;
        bgEl.style.backgroundImage = `url('${data.src}')`;
        document.getElementById('img-title').textContent = data.title;
        document.getElementById('img-date').textContent = data.date;
        document.getElementById('img-desc').textContent = data.desc;
        document.getElementById('img-counter').textContent = `${currentIndex + 1} / ${images.length}`;
        imgEl.style.opacity = '1';

        // Update thumbnails
        document.querySelectorAll('.thumb-item').forEach((t, i) => {
            t.classList.toggle('active', i === currentIndex);
        });
    }, 300);
}

function renderThumbnails() {
    const bar = document.getElementById('thumb-bar');
    bar.innerHTML = '';
    images.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = 'thumb-item' + (i === currentIndex ? ' active' : '');
        div.onclick = () => { currentIndex = i; updateGallery(); };
        const image = document.createElement('img');
        image.src = img.src; image.alt = img.title;
        div.appendChild(image);
        bar.appendChild(div);
    });
}

function changeImage(step) {
    currentIndex = (currentIndex + step + images.length) % images.length;
    updateGallery();
}

function switchCategory(cat, e) {
    currentCategory = cat;
    images = galleryData[cat];
    currentIndex = 0;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    renderThumbnails();
    updateGallery();
}

function openLightbox() {
    document.getElementById('lightbox-img').src = images[currentIndex].src;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'ArrowLeft')  changeImage(-1);
    if (e.key === 'Escape') closeLightbox();
});

// Navbar scroll
const nav = document.getElementById('navbar');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60), { passive: true });

// Init
renderThumbnails();
updateGallery();
</script>
</body>
</html>
